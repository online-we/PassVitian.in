[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  [build.environment]
  # VITE_* Cloudinary vars are public by design (client upload). Don't treat them as secrets.
  SECRETS_SCAN_OMIT_KEYS = "VITE_CLOUDINARY_CLOUD_NAME,VITE_CLOUDINARY_UPLOAD_PRESET"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "PassVitian,your-cloud-name-here"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
